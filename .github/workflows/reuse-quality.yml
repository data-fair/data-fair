name: Quality checks

on:
  workflow_call:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout git repository
      uses: actions/checkout@v4
    
    - uses: actions/setup-node@v3
      with:
        node-version: 24
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Build types
      run: npm run build-types

    - name: Type check
      run: npm -w ui run check-types

    - name: Build UI
      run: npm -w ui run build

    - name: Build parquet-writer
      run: npm -w parquet-writer run build

    - name: Init .env
      run: ./dev/init-env.sh

    - name: Start test services
      run: docker compose --profile test up -d --wait

    - name: Start mock server
      run: node --experimental-strip-types dev/mock-server.ts &

    - name: Start dev API
      run: MODE=server_worker NODE_ENV=development NODE_CONFIG_DIR=api/config node --experimental-strip-types api/index.ts &

    - name: Run tests
      run: OGR2OGR_SKIP=true npm run test-unit && OGR2OGR_SKIP=true npm run test-api

    - name: Audit
      run: npm audit --omit=dev --audit-level=critical

    - name: Stop test services
      if: always()
      run: docker compose --profile test down